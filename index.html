<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Isla Náufrago - MiniApp</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Isla Náufrago</h1>
      <div id="status">
        <span id="coin">Coin: 0</span>
        <span id="ton">TON: 0</span>
        <span id="xp">XP: 0</span>
        <span id="level">Nivel: 1</span>
      </div>
    </header>

    <main>
      <section id="island">
        <div class="palm">
          <button id="openCoco">Abrir Coco</button>
          <div id="cocoMsg"></div>
        </div>

        <div class="actions">
          <button id="btnFish">Pescar</button>
          <div id="fishResult"></div>
        </div>

        <div class="store">
          <h3>Tienda (Drone)</h3>
          <div id="hooksList"></div>
        </div>

        <div class="inventory">
          <h3>Inventario</h3>
          <div id="inventoryList"></div>
        </div>

        <div class="market">
          <h3>Mercado</h3>
          <div id="marketList"></div>
        </div>
      </section>
    </main>

    <footer>
      <small>Demo - No garantiza retornos. Integración TON pendiente.</small>
    </footer>
  </div>

  <script src="/client.js"></script>
</body>
</html>
